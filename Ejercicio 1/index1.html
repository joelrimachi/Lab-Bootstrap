<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Perfil</title>
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow p-4">

            <div class="row align-items-center">

                <!-- Foto -->
                <div class="col-md-4 text-center">

                    <img src="./gato.jpg"
                        alt="Felipe"
                        class="rounded-circle img-fluid"
                        width="200">

                </div>
                <div class="col-md-8">
                    <h2>Felipe</h2>
                    <h5 class="text-muted">
                        Cazador de ratones
                    </h5>
                    <p>
                        Felipe es un gato de calle de Yanahuara que vive cerca del río Chili junto a una familia muy adinerada. Le gusta descansar durante el día y patrullar su territorio por las noches.
                    </p>

                    <button class="btn btn-success me-2">
                        Editar perfil
                    </button>

                    <button class="btn btn-primary">
                        Enviar mensaje
                    </button>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
